<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="aqua-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b2ebf2" />
      <stop offset="50%" stop-color="#4dd0e1" />
      <stop offset="100%" stop-color="#00838f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0f172a" />
  <g transform="translate(100, 50)" filter="url(#glow)">
    <polygon points="100,20 180,70 180,230 100,280 20,230 20,70" fill="url(#aqua-grad)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.5"/>
    <polygon points="100,20 180,70 100,120 20,70" fill="#e0f7fa" opacity="0.6" />
    <polygon points="100,120 180,70 180,230 100,180" fill="#26c6da" opacity="0.4" />
    <polygon points="20,70 100,120 100,180 20,230" fill="#006064" opacity="0.4" />
    <polygon points="100,120 180,230 100,280 20,230" fill="#00acc1" opacity="0.5" />
    <line x1="100" y1="120" x2="100" y2="280" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
  </g>
</svg>
