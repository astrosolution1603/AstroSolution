<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="jade-grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a5d6a7" />
      <stop offset="60%" stop-color="#4caf50" />
      <stop offset="100%" stop-color="#1b5e20" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0f172a" />
  <circle cx="200" cy="200" r="120" fill="url(#jade-grad)" filter="url(#glow)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
  <ellipse cx="160" cy="140" rx="30" ry="15" fill="#ffffff" opacity="0.3" transform="rotate(-30 160 140)" />
</svg>
