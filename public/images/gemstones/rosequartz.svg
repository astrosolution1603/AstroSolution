<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="rose-grad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f8bbd0" />
      <stop offset="40%" stop-color="#f48fb1" />
      <stop offset="100%" stop-color="#ad1457" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0f172a" />
  <path d="M 200,60 C 320,60 360,180 280,300 C 240,360 160,360 120,300 C 40,180 80,60 200,60 Z" fill="url(#rose-grad)" filter="url(#glow)"/>
  <path d="M 180,100 C 220,100 240,140 220,180" fill="none" stroke="#ffffff" stroke-width="15" stroke-linecap="round" opacity="0.4" />
</svg>
